name: Commitizen

# Commitizen CI Contract v1 — conventional commit verification on PR/push + manual
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cz-check:
    name: Conventional Commits Check
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Commitizen
        run: pip install 'commitizen~=4.8.0'

      - name: Verify conventional commits
        run: cz check --rev-range HEAD~1..HEAD