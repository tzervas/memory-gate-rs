name: CI

# Triggered on push/PR; also manual.
# Linux-only self-hosted; multi-OS release deferred to self-hosted capacity.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: "2"

jobs:
  fmt:
    name: Rustfmt
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (all features)
        run: |
          set -euo pipefail
          # all-features pulls qdrant/fastembed → native-tls/openssl-sys.
          # Self-hosted images often lack libssl-dev; no sudo apt (no-new-privileges).
          if pkg-config --exists openssl 2>/dev/null; then
            cargo clippy --all-targets --all-features -- -D warnings
          else
            echo "openssl headers missing — skip all-features clippy (cannot sudo apt)"
          fi

  # Multi-OS release deferred to self-hosted capacity.
  test:
    name: Test (${{ matrix.rust }})
    runs-on: [self-hosted, linux, x64, podman]
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-${{ matrix.rust }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Run tests (all features)
        run: |
          set -euo pipefail
          if pkg-config --exists openssl 2>/dev/null; then
            cargo test --verbose --all-features
          else
            echo "openssl headers missing — skip all-features tests"
          fi

  doctest:
    name: Documentation Tests
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run doctests
        run: |
          set -euo pipefail
          if pkg-config --exists openssl 2>/dev/null; then
            cargo test --doc --all-features
          else
            echo "openssl headers missing — skip all-features doctests"
            cargo test --doc
          fi

  docs:
    name: Documentation
    # Non-blocking: openssl-sys (via all-features) may be unavailable without sudo.
    continue-on-error: true
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: |
          set -euo pipefail
          if pkg-config --exists openssl 2>/dev/null; then
            cargo doc --no-deps --all-features
          else
            echo "openssl headers missing — docs with default features only"
            cargo doc --no-deps
          fi
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Code Coverage
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: |
          set -euo pipefail
          if pkg-config --exists openssl 2>/dev/null; then
            cargo llvm-cov --all-features --lcov --output-path lcov.info
          else
            echo "openssl headers missing — coverage with default features"
            cargo llvm-cov --lcov --output-path lcov.info
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
